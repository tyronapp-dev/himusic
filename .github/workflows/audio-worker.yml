name: YouTube Audio Import

# Zwei Auslöser:
# 1. repository_dispatch – der normale Weg: die App ruft POST /dispatch-import am Cloudflare
#    Worker auf, der dispatcht hierher (braucht einen gültigen GH_PAT im Worker).
# 2. push auf .import-trigger.json – PAT-unabhängiger Ersatzweg zum Testen/Notfall-Import:
#    Datei mit {"youtube_url": "..."} committen, fertig.
on:
  repository_dispatch:
    types: [youtube-import-event]
  push:
    paths:
      - '.import-trigger.json'

# ARCHITEKTUR – Retry-Kette gegen IP-Reputations-Blocks:
# YouTube blockt einzelne Azure-Rechenzentrums-IPs unvorhersehbar ("Sign in to confirm...").
# Empirisch klappt ~1 von 4 Läufen, abhängig davon, welche zufällige IP der Runner bekommt.
# Deshalb läuft der Import als Kette von bis zu 8 Versuchs-Jobs: JEDER Job bekommt einen
# frischen Runner mit NEUER zufälliger IP. Sobald ein Versuch Erfolg hat, werden alle
# folgenden übersprungen (if-Bedingung). Kein Re-Dispatch, kein Token, keine Endlosschleife
# möglich – die Kette ist statisch auf 8 begrenzt. Bei ~25% Erfolg/IP ergibt das >90% gesamt.
jobs:
  resolve:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      url: ${{ steps.params.outputs.url }}
      job_id: ${{ steps.params.outputs.job_id }}
    steps:
      - uses: actions/checkout@v4
      - id: params
        env:
          EVENT_NAME: ${{ github.event_name }}
          PAYLOAD_URL: ${{ github.event.client_payload.youtube_url }}
          PAYLOAD_JOB_ID: ${{ github.event.client_payload.job_id }}
        run: |
          if [ "$EVENT_NAME" = "repository_dispatch" ]; then
            echo "url=$PAYLOAD_URL" >> "$GITHUB_OUTPUT"
            echo "job_id=$PAYLOAD_JOB_ID" >> "$GITHUB_OUTPUT"
          else
            URL=$(jq -r '.youtube_url // empty' .import-trigger.json 2>/dev/null || echo "")
            echo "url=$URL" >> "$GITHUB_OUTPUT"
            echo "job_id=push-${GITHUB_RUN_ID}" >> "$GITHUB_OUTPUT"
          fi

  a1:
    name: Versuch 1/8
    needs: resolve
    if: ${{ needs.resolve.outputs.url != '' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/yt-import
        with:
          youtube_url:          ${{ needs.resolve.outputs.url }}
          job_id:               ${{ needs.resolve.outputs.job_id }}
          r2_account_id:        ${{ secrets.R2_ACCOUNT_ID }}
          r2_access_key_id:     ${{ secrets.R2_ACCESS_KEY_ID }}
          r2_secret_access_key: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          r2_bucket_name:       ${{ secrets.R2_BUCKET_NAME }}
          r2_public_domain:     ${{ secrets.R2_PUBLIC_DOMAIN }}
          d1_api_url:           ${{ secrets.D1_API_URL }}
          d1_api_key:           ${{ secrets.D1_API_KEY }}
          youtube_cookies:      ${{ secrets.YOUTUBE_COOKIES }}

  a2:
    name: Versuch 2/8 (neue IP)
    needs: [resolve, a1]
    if: ${{ !cancelled() && needs.a1.result == 'failure' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/yt-import
        with:
          youtube_url:          ${{ needs.resolve.outputs.url }}
          job_id:               ${{ needs.resolve.outputs.job_id }}
          r2_account_id:        ${{ secrets.R2_ACCOUNT_ID }}
          r2_access_key_id:     ${{ secrets.R2_ACCESS_KEY_ID }}
          r2_secret_access_key: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          r2_bucket_name:       ${{ secrets.R2_BUCKET_NAME }}
          r2_public_domain:     ${{ secrets.R2_PUBLIC_DOMAIN }}
          d1_api_url:           ${{ secrets.D1_API_URL }}
          d1_api_key:           ${{ secrets.D1_API_KEY }}
          youtube_cookies:      ${{ secrets.YOUTUBE_COOKIES }}

  a3:
    name: Versuch 3/8 (neue IP)
    needs: [resolve, a2]
