name: YouTube Audio Import

on:
  repository_dispatch:
    types: [youtube-import-event]

jobs:
  import-audio:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ffmpeg für Audio-Konvertierung
      - name: Install ffmpeg
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg

      # Deno – wird von yt-dlp für JavaScript-Challenge-Entschlüsselung genutzt
      - name: Install Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # yt-dlp: bewusst der PyPI-"nightly"-Kanal statt stable. YouTube ändert seine
      # Bot-Erkennung so oft, dass Stable-Releases teils tagelang hinterherhinken – der
      # Nightly-Build enthält die aktuellsten Fixes für genau solche Ausfälle.
      # bgutil-ytdlp-pot-provider: das yt-dlp-Plugin, das mit dem Token-Server unten spricht.
      - name: Install Python dependencies
        run: pip install --quiet -U --pre "yt-dlp[default]" "yt-dlp[curl_cffi]" bgutil-ytdlp-pot-provider boto3 requests
      - name: yt-dlp-Version protokollieren
        run: yt-dlp --version

      # PO-Token-Provider: generiert live einen kryptografischen "Proof of Origin"-Token
      # (löst YouTubes BotGuard-Challenge in einer echten JS-Umgebung), GENAU der Mechanismus,
      # den "Sign in to confirm you're not a bot" verlangt – ganz ohne Cookies, die vorher
      # ständig verfielen. Läuft als lokaler HTTP-Server auf Port 4416, den yt-dlp automatisch
      # anspricht (Standard-Port, keine extra Flags nötig).
      - name: PO-Token-Provider starten
        run: docker run --name bgutil-provider -d --init -p 4416:4416 brainicism/bgutil-ytdlp-pot-provider
      - name: Auf PO-Token-Provider warten
        run: |
          for i in $(seq 1 20); do
            (echo > /dev/tcp/127.0.0.1/4416) >/dev/null 2>&1 && echo "Provider bereit nach ${i}s" && exit 0
            sleep 1
          done
          echo "::warning::PO-Token-Provider nach 20s nicht erreichbar – yt-dlp faellt auf Multi-Client-Fallback zurueck"

      - name: Run extractor
        id: extractor
        env:
          YOUTUBE_URL:          ${{ github.event.client_payload.youtube_url }}
          JOB_ID:               ${{ github.event.client_payload.job_id }}
          R2_ACCOUNT_ID:        ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID:     ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME:       ${{ secrets.R2_BUCKET_NAME }}
          R2_PUBLIC_DOMAIN:     ${{ secrets.R2_PUBLIC_DOMAIN }}
          D1_API_URL:           ${{ secrets.D1_API_URL }}
          D1_API_KEY:           ${{ secrets.D1_API_KEY }}
          YOUTUBE_COOKIES:      ${{ secrets.YOUTUBE_COOKIES }}
        run: python src/extractor_worker.py

      # Root-Cause-Fix gegen IP-Reputations-Blocks: Der Retry in extractor_worker.py wiederholt
      # INNERHALB desselben Jobs – also auf DERSELBEN Azure-IP. Das hilft nichts gegen "diese IP
      # ist gerade verbrannt". Hier wird bei Fehlschlag der GANZE Job neu ausgelöst → ein frischer
      # Runner bekommt eine NEUE zufällige IP. Empirisch ~25% Erfolgschance pro IP → bei 8 Versuchen
      # in Folge >90% Gesamterfolgschance, komplett kostenlos auf bestehender Infrastruktur.
      #
      # Läuft bewusst über den BESTEHENDEN /dispatch-import-Endpunkt am Cloudflare Worker (der hat
      # GH_PAT schon konfiguriert und dispatcht nachweislich zuverlässig) statt einen zweiten,
      # separaten GitHub-Token als neues Actions-Secret zu brauchen – kein zusätzlicher Setup-Schritt.
      - name: Bei Fehlschlag mit frischer IP automatisch neu ausloesen
        if: failure() && steps.extractor.outcome == 'failure'
        env:
          YOUTUBE_URL:  ${{ github.event.client_payload.youtube_url }}
          RETRY_COUNT:  ${{ github.event.client_payload.retry_count }}
        run: |
          RETRY_COUNT=${RETRY_COUNT:-0}
          MAX_RETRIES=8
          if [ "$RETRY_COUNT" -ge "$MAX_RETRIES" ]; then
            echo "::error::Maximale Anzahl automatischer Neuversuche ($MAX_RETRIES) erreicht - endgueltig fehlgeschlagen."
            exit 0
          fi
          NEXT_RETRY=$((RETRY_COUNT + 1))
          echo "Automatischer Neuversuch $NEXT_RETRY/$MAX_RETRIES (frischer Runner = neue IP)..."
          sleep $((RANDOM % 8 + 4))
          PAYLOAD=$(jq -n --arg url "$YOUTUBE_URL" --argjson retry "$NEXT_RETRY" \
            '{youtube_url: $url, retry_count: $retry}')
          curl -s -X POST "https://himusic-api.tyron-app.workers.dev/dispatch-import" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD"
