<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Himusic">
    <title>Himusic Login</title>
    
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
    
    <style>
        body { background: #000; color: #fff; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: -apple-system, sans-serif; margin: 0; }
        .login-box { display: flex; flex-direction: column; gap: 15px; width: 300px; padding: 30px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 14px; text-align: center; }
        h2 { margin-top: 0; font-size: 24px; }
        input { padding: 12px; border-radius: 8px; border: none; background: rgba(255,255,255,0.1); color: white; font-size: 16px; outline: none; text-align: center; }
        button { padding: 12px; border-radius: 8px; border: none; background: #fa233b; color: white; font-size: 16px; font-weight: 600; cursor: pointer; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>Himusic</h2>
        <input type="password" id="password" placeholder="Passwort">
        <button id="login-btn">Entsperren</button>
        <p id="error-msg" style="color: #ff3b30; font-size: 14px; display: none;">Falsches Passwort!</p>
    </div>

    <script>
        // HIER DEIN EIGENES PASSWORT EINTRAGEN:
        const APP_PASSWORD = "Kakalika";

        // Wenn schon eingeloggt, SOFORT weiterleiten
        if(localStorage.getItem('himusic_auth') === 'true') {
            window.location.replace("index.html");
        }

        document.getElementById('login-btn').addEventListener('click', () => {
            if(document.getElementById('password').value === APP_PASSWORD) {
                localStorage.setItem('himusic_auth', 'true');
                window.location.replace("index.html");
            } else {
                document.getElementById('error-msg').style.display = 'block';
            }
        });
    </script>
</body>
</html>
